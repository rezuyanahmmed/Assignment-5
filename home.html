<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker - Home</title>
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .card-shadow {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">

  <nav class="bg-white border-b px-8 py-4 flex justify-between items-center">
    <div class="flex items-center gap-2">
      <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-8" alt="Logo">
      <span class="font-bold text-lg text-slate-800">GitHub Issues Tracker</span>
    </div>
    <div class="flex gap-2 w-1/3">
      <input id="search-input" type="text" placeholder="Search issues..."
        class="w-full border rounded-md px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500">
      <button onclick="handleSearch()"
        class="bg-blue-600 text-white px-4 py-1.5 rounded-md hover:bg-blue-700 transition">+ New Issue</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-8">
    <div class="flex justify-center mb-8">
      <div class="inline-flex bg-white border rounded-lg p-1">
        <button onclick="filterIssues('all')" class="tab-btn px-8 py-2 rounded-md font-medium bg-blue-600 text-white"
          id="all-tab">All</button>
        <button onclick="filterIssues('open')"
          class="tab-btn px-8 py-2 rounded-md font-medium text-slate-600 hover:bg-slate-50" id="open-tab">Open</button>
        <button onclick="filterIssues('closed')"
          class="tab-btn px-8 py-2 rounded-md font-medium text-slate-600 hover:bg-slate-50"
          id="closed-tab">Closed</button>
      </div>
    </div>

    <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-xl border border-dashed border-blue-400">
      <div class="flex items-center gap-4">
        <div class="bg-blue-100 p-3 rounded-full">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <div>
          <h2 class="text-2xl font-bold text-slate-800" id="issue-count">0 Issues</h2>
          <p class="text-sm text-slate-500">Track and manage your project issues.</p>
        </div>
      </div>
      <div class="flex gap-4 text-sm font-medium">
        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
      </div>
    </div>

    <div id="loader" class="text-center py-20 hidden">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
    </div>

    <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    </div>
  </main>

  <div id="issue-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-lg w-full p-6 relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black">&times;</button>
      <div id="modal-content">
      </div>
    </div>
  </div>


  <!-- Modal section -->

  <!-- Open the modal using ID.showModal() method -->
  <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
  <dialog id="modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
      <h3 class="text-lg font-bold">Hello!</h3>
      <p class="py-4">Press ESC key or click the button below to close</p>
      <div class="modal-action">
        <form method="dialog">
          <!-- if there is a button in form, it will close the modal -->
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>


  <script src="./home.js"></script>
</body>

</html>
