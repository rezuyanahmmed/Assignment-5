<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- tailwind and daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

  <div class="card w-96 bg-white shadow-xl p-6 mx-auto">

    <div class="flex justify-center">
      <img src="./assets/github-logo.png" class="w-16" />
    </div>

    <h2 class="text-2xl font-bold text-center mt-3">
      GitHub Issues Tracker
    </h2>

    <p class="text-center text-gray-500 text-sm mb-4">
      Sign in to manage your issues
    </p>

    <div class="form-control">
      <label class="label">
        <span class="label-text">Username</span>
      </label>

      <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full" />

      <p class="text-sm text-purple-600 mt-1">
        Default: admin
      </p>
    </div>

    <div class="form-control mt-3">
      <label class="label">
        <span class="label-text">Password</span>
      </label>

      <input id="userPass" type="password" placeholder="Enter Password" class="input input-bordered w-full" />

      <p class="text-sm text-purple-600 mt-1">
        Default: admin123
      </p>
    </div>

    <button id="signin" class="btn btn-primary mt-5">
      Sign In
    </button>

    <div class="divider">OR</div>

    <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">

      <p>
        <span class="font-semibold">Username:</span> admin
      </p>

      <p>
        <span class="font-semibold">Password:</span> admin123
      </p>

    </div>

  </div>




  <script src="./script.js"></script>
</body>

</html>
